<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Bridge Chunk Split Test</title>
    <style>
      body {
        margin: 0;
        font-family: system-ui, sans-serif;
        display: grid;
        grid-template-columns: minmax(0, 2fr) minmax(0, 1fr);
        height: 100vh;
      }

      canvas {
        width: 100%;
        height: 100%;
        display: block;
        background: radial-gradient(circle at top, #1b2838, #090c12 65%);
      }

      aside {
        padding: 1.25rem;
        background: #0f1219;
        color: #dce3f4;
        display: flex;
        flex-direction: column;
        gap: 1rem;
        border-left: 1px solid rgba(255, 255, 255, 0.05);
      }

      h1 {
        margin: 0;
        font-size: 1.5rem;
      }

      .controls {
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
      }

      button {
        padding: 0.75rem 1rem;
        border: none;
        border-radius: 6px;
        background: #3663f5;
        color: #f7f9ff;
        font-size: 0.95rem;
        cursor: pointer;
      }

      button.secondary {
        background: #1f2a3b;
      }

      button:disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }

      #event-log {
        margin: 0;
        padding-left: 1.25rem;
        font-size: 0.9rem;
        max-height: 10rem;
        overflow: auto;
      }

      pre {
        margin: 0;
        padding: 0.75rem;
        background: rgba(255, 255, 255, 0.05);
        border-radius: 6px;
        font-size: 0.85rem;
        line-height: 1.4;
        min-height: 6rem;
      }
    </style>
    <script type="importmap">
      {
        "imports": {
          "three": "/vendor/three/build/three.module.js",
          "three/addons/": "/vendor/three/examples/jsm/",
          "@dimforge/rapier3d-compat": "/vendor/rapier/rapier.mjs"
        }
      }
    </script>
  </head>
  <body>
    <main>
      <canvas id="split-canvas"></canvas>
    </main>
    <aside>
      <header>
        <h1>Chunk Split Sandbox</h1>
        <p>Use the controls to fracture the test bond or split the chunk directly. The log records key state changes.</p>
      </header>
      <div class="controls">
        <button id="btn-fracture">fractureBond()</button>
        <button id="btn-split">splitChunk()</button>
        <button id="btn-reload" class="secondary">Reset Scene</button>
      </div>
      <section>
        <h2 style="margin: 0; font-size: 1.1rem;">Events</h2>
        <ol id="event-log"></ol>
      </section>
      <section>
        <h2 style="margin: 0; font-size: 1.1rem;">Debug Log</h2>
        <pre id="debug-log"></pre>
      </section>
    </aside>
    <script type="module" src="./bridge/splitTest.js"></script>
  </body>
</html>
